<a class="post-card" href="{{CARD_URL}}">
  <div class="card-cover">
    <img src="{{CARD_COVER}}"
         alt="{{CARD_TITLE}}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="card-cover-placeholder" style="display:none">
      <div class="ph-rule"></div>
      <p class="ph-title">{{CARD_TITLE}}</p>
    </div>
  </div>
  <div class="card-body">
    <h2 class="card-title">{{CARD_TITLE}}</h2>
    <p class="card-dek">{{CARD_DESCRIPTION}}</p>
    <div class="card-meta"><time>{{CARD_DATE_HUMAN}}</time> · {{CARD_READING_TIME}} min read</div>
  </div>
</a>
