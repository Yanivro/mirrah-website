<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>adhd motivation — mirrah cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Source+Serif+4:ital,opsz,wght@1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:900px;height:1125px;overflow:hidden;}
  body{
    background:#B0C0B2;
    font-family:Nunito,-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  :root{
    --ink:#3a3530; --ink2:#6a6560; --ink3:#9a9590;
    --coral:#C4725A; --coral-dark:#A85C46; --teal:#6AADA0;
    --grad: linear-gradient(to bottom,
      #E8AF96 0%, #D49E8A 22%, #D4A8C0 50%, #C5BCB8 75%, #B0C0B2 100%);
  }

  .slide{
    width:900px; height:1125px;
    background:var(--grad);
    display:flex; flex-direction:column; justify-content:space-between;
    padding:64px 72px 58px;
    position:relative; overflow:hidden;
  }
  .slide::before{
    content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(circle at 50% 45%, rgba(255,250,240,.55), transparent 62%);
  }
  .slide > *{position:relative; z-index:1;}

  /* TOP */
  .kick{
    font-family:Nunito; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:#6b4a3c;
  }

  /* MID */
  .mid{}
  .ttl-xl{
    font-family:"Source Serif 4",serif; font-style:italic; font-weight:600;
    font-size:70px; line-height:1.04; color:#2c2722;
    letter-spacing:-.015em;
    text-shadow:0 1px 0 rgba(255,250,240,.4);
  }

  /* novelty arc visual */
  .arc-block{
    margin-top:44px;
  }
  .arc-labels{
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:0 6px;
    font-family:Nunito; font-size:11px; font-weight:800;
    letter-spacing:1.8px; text-transform:uppercase;
  }
  .arc-labels .lbl-peak{ color:#A85C46; }
  .arc-labels .lbl-abyss{ color:#6a6560; }
  .arc-labels .lbl-new{ color:#3f7d72; }

  /* BOTTOM */
  .divider{
    width:100%; height:1px;
    background:rgba(44,39,34,.14);
    margin-bottom:28px;
  }
  .cover-sub{
    font-family:"Source Serif 4",serif; font-style:italic;
    font-size:24px; line-height:1.42; color:#5a3d33;
  }

  .wm-corner{
    position:absolute; bottom:40px; right:62px;
    font-family:"Source Serif 4",serif; font-style:italic;
    font-weight:600; font-size:19px; color:#9a9590;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="kick">mirrah · the space between</div>

  <div class="mid">
    <div class="ttl-xl">your motivation<br>didn't disappear.<br>it ran out of<br>novelty.</div>

    <div class="arc-block">
      <!-- abstract novelty cycle arc: rise → peak → descent → re-entry -->
      <svg width="756" height="170" viewBox="0 0 756 170" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- faint full cycle -->
        <path d="M 20,148 C 80,148 120,22 189,22 C 258,22 300,148 380,148 C 460,148 500,22 568,22 C 636,22 678,148 736,148"
          stroke="#C4725A" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.28"/>
        <!-- main highlighted first arc: new why → peak → abyss -->
        <path d="M 20,148 C 90,148 140,18 200,18 C 268,18 308,148 378,148"
          stroke="#C4725A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <!-- peak dot -->
        <circle cx="200" cy="18" r="7" fill="#C4725A"/>
        <!-- abyss dot -->
        <circle cx="378" cy="148" r="7" fill="#9a9590"/>
        <!-- next arc: abyss → new peak -->
        <path d="M 378,148 C 448,148 498,18 568,18"
          stroke="#6AADA0" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="568" cy="18" r="7" fill="#6AADA0"/>
        <!-- labels -->
        <text x="200" y="10" font-family="Nunito" font-size="12" font-weight="800" fill="#A85C46" letter-spacing="1.5" text-anchor="middle">PEAK</text>
        <text x="378" y="168" font-family="Nunito" font-size="11" font-weight="800" fill="#6a6560" letter-spacing="1.5" text-anchor="middle">ABYSS</text>
        <text x="568" y="10" font-family="Nunito" font-size="12" font-weight="800" fill="#3f7d72" letter-spacing="1.5" text-anchor="middle">NEW WHY</text>
        <!-- baseline -->
        <line x1="0" y1="148" x2="756" y2="148" stroke="rgba(44,39,34,.10)" stroke-width="1" stroke-dasharray="4 4"/>
      </svg>
    </div>
  </div>

  <div class="bottom">
    <div class="divider"></div>
    <div class="cover-sub">for the brain that goes from obsessed → flat, and always wonders what's wrong with it.</div>
  </div>

  <div class="wm-corner">mirrah</div>
</div>
</body>
</html>
