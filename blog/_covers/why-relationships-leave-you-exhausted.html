<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>why relationships leave you exhausted — mirrah cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Source+Serif+4:ital,opsz,wght@1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:900px;height:1125px;overflow:hidden;}
  body{
    font-family:Nunito,-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  :root{
    --coral:#C4725A; --coral-dark:#A85C46;
    --teal:#6AADA0;
    --grad: linear-gradient(to bottom,
      #E8AF96 0%, #D49E8A 22%, #D4A8C0 50%, #C5BCB8 75%, #B0C0B2 100%);
  }

  .slide{
    width:900px; height:1125px;
    background:var(--grad);
    display:flex; flex-direction:column; justify-content:space-between;
    padding:64px 72px 58px;
    position:relative; overflow:hidden;
  }
  .slide::before{
    content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(circle at 50% 45%, rgba(255,250,240,.55), transparent 62%);
  }
  .slide > *{position:relative; z-index:1;}

  /* abstract balance scale — two arms tilting */
  .scale-svg{
    position:absolute; right:52px; top:50%; transform:translateY(-50%);
    opacity:0.13; z-index:0;
  }

  /* TOP */
  .kick{
    font-family:Nunito; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:#6b4a3c;
  }

  /* MID */
  .ttl-xl{
    font-family:"Source Serif 4",serif; font-style:italic; font-weight:600;
    font-size:67px; line-height:1.05; color:#2c2722;
    letter-spacing:-.015em;
    text-shadow:0 1px 0 rgba(255,250,240,.4);
  }

  /* budget meter visual */
  .budget-block{
    margin-top:44px;
    display:flex; flex-direction:column; gap:14px;
  }
  .budget-row{
    display:flex; align-items:center; gap:18px;
  }
  .budget-label{
    font-family:Nunito; font-size:12px; font-weight:800;
    letter-spacing:1.6px; text-transform:uppercase;
    width:148px; flex-shrink:0; color:#5a3d33;
  }
  .budget-track{
    flex:1; height:16px;
    background:rgba(44,39,34,.10);
    border-radius:8px; overflow:hidden;
    position:relative;
  }
  .budget-fill{
    height:100%; border-radius:8px;
    position:absolute; left:0; top:0;
  }
  .budget-badge{
    font-family:Nunito; font-size:10px; font-weight:800;
    letter-spacing:1.4px; text-transform:uppercase;
    padding:4px 10px; border-radius:10px; flex-shrink:0;
  }
  .badge-savings{background:rgba(106,173,160,.22); color:#2d6b65;}
  .badge-tax{background:rgba(196,114,90,.22); color:#A85C46;}

  .budget-row.safe .budget-fill{width:28%; background:rgba(106,173,160,.5);}
  .budget-row.inconsistent .budget-fill{width:88%; background:rgba(196,114,90,.6);}
  .budget-row.toxic .budget-fill{width:100%; background:rgba(160,60,40,.55);}

  /* BOTTOM */
  .divider{
    width:100%; height:1px;
    background:rgba(44,39,34,.14);
    margin-bottom:26px;
  }
  .cover-sub{
    font-family:"Source Serif 4",serif; font-style:italic;
    font-size:24px; line-height:1.42; color:#5a3d33;
  }

  .wm-corner{
    position:absolute; bottom:40px; right:62px;
    font-family:"Source Serif 4",serif; font-style:italic;
    font-weight:600; font-size:19px; color:#9a9590;
  }
</style>
</head>
<body>
<div class="slide">

  <!-- abstract scale arms -->
  <svg class="scale-svg" aria-hidden="true" width="220" height="300" viewBox="0 0 220 300" fill="none">
    <!-- fulcrum post -->
    <line x1="110" y1="80" x2="110" y2="280" stroke="#5a3d33" stroke-width="5" stroke-linecap="round"/>
    <!-- tilted beam -->
    <line x1="20" y1="50" x2="200" y2="90" stroke="#5a3d33" stroke-width="4" stroke-linecap="round"/>
    <!-- left pan (lighter/higher) -->
    <ellipse cx="20" cy="50" rx="22" ry="8" stroke="#5a3d33" stroke-width="3" fill="none"/>
    <!-- right pan (heavier/lower) -->
    <ellipse cx="200" cy="90" rx="22" ry="8" stroke="#5a3d33" stroke-width="3" fill="none"/>
    <!-- pan chains -->
    <line x1="20" y1="58" x2="20" y2="90" stroke="#5a3d33" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="200" y1="98" x2="200" y2="130" stroke="#5a3d33" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- base triangle -->
    <polygon points="95,280 125,280 110,200" stroke="#5a3d33" stroke-width="3" fill="none"/>
  </svg>

  <div class="kick">mirrah · the space between</div>

  <div class="mid">
    <div class="ttl-xl">the reason you're tired<br>after waiting<br>on his texts.</div>

    <div class="budget-block" aria-hidden="true">
      <div class="budget-row safe">
        <div class="budget-label">safe person</div>
        <div class="budget-track"><div class="budget-fill"></div></div>
        <div class="budget-badge badge-savings">savings</div>
      </div>
      <div class="budget-row inconsistent">
        <div class="budget-label">inconsistent</div>
        <div class="budget-track"><div class="budget-fill"></div></div>
        <div class="budget-badge badge-tax">tax</div>
      </div>
      <div class="budget-row toxic">
        <div class="budget-label">unpredictable</div>
        <div class="budget-track"><div class="budget-fill"></div></div>
        <div class="budget-badge badge-tax">withdrawal</div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="divider"></div>
    <div class="cover-sub">it's metabolism.</div>
  </div>

  <div class="wm-corner">mirrah</div>
</div>
</body>
</html>
