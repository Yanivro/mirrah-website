<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vagus nerve — mirrah cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Source+Serif+4:ital,opsz,wght@1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:900px;height:1125px;overflow:hidden;}
  body{
    background:#B0C0B2;
    font-family:Nunito,-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* standard mirrah carousel tokens */
  :root{
    --ink:#3a3530; --ink2:#6a6560; --ink3:#9a9590;
    --coral:#C4725A; --coral-dark:#A85C46; --teal:#6AADA0;
    --raised-sm: 3px 3px 8px rgba(0,0,0,.09), -3px -3px 8px rgba(255,255,255,.88);
    --grad: linear-gradient(to bottom,
      #E8AF96 0%, #D49E8A 22%, #D4A8C0 50%, #C5BCB8 75%, #B0C0B2 100%);
  }

  .slide{
    width:900px; height:1125px;
    background:var(--grad);
    display:flex; flex-direction:column; justify-content:space-between;
    padding:64px 72px 58px;
    position:relative; overflow:hidden;
  }
  /* standard mirrah static breath wash */
  .slide::before{
    content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(circle at 50% 45%, rgba(255,250,240,.55), transparent 62%);
  }
  .slide > *{position:relative; z-index:1;}

  /* TOP */
  .kick{
    font-family:Nunito; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:#6b4a3c;
  }

  /* MID: headline */
  .mid{}
  .ttl-xl{
    font-family:"Source Serif 4",serif; font-style:italic; font-weight:600;
    font-size:70px; line-height:1.04; color:#2c2722;
    letter-spacing:-.015em;
    text-shadow:0 1px 0 rgba(255,250,240,.4);
  }

  /* two-state cards — full-width, stacked */
  .states-block{
    margin-top:56px;
    display:flex; flex-direction:column; gap:16px;
  }
  .state-card{
    border-radius:20px; padding:28px 32px;
    display:flex; align-items:center; gap:28px;
  }
  .state-card.anxious{
    background:rgba(196,114,90,.18);
    border:1.5px solid rgba(196,114,90,.32);
  }
  .state-card.frozen{
    background:rgba(106,173,160,.18);
    border:1.5px solid rgba(106,173,160,.32);
  }

  /* pulse icon */
  .sig-icon{flex-shrink:0;}

  .state-text{flex:1;}
  .state-name{
    font-family:Nunito; font-size:11px; font-weight:800;
    letter-spacing:2.5px; text-transform:uppercase;
    margin-bottom:6px;
  }
  .state-card.anxious .state-name{color:#A85C46;}
  .state-card.frozen .state-name{color:#3f7d72;}
  .state-desc{
    font-family:"Source Serif 4",serif; font-style:italic;
    font-size:22px; font-weight:600; color:#2c2722; line-height:1.25;
  }
  .state-sub{
    font-family:Nunito; font-size:15px; color:#5a4030;
    line-height:1.45; margin-top:5px;
  }
  .state-card.frozen .state-sub{color:#2d5e58;}

  /* BOTTOM */
  .bottom{}
  .divider{
    width:100%; height:1px;
    background:rgba(44,39,34,.14);
    margin-bottom:28px;
  }
  .cover-sub{
    font-family:"Source Serif 4",serif; font-style:italic;
    font-size:24px; line-height:1.42; color:#5a3d33;
  }

  .wm-corner{
    position:absolute; bottom:40px; right:62px;
    font-family:"Source Serif 4",serif; font-style:italic;
    font-weight:600; font-size:19px; color:#9a9590;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="kick">mirrah · the space between</div>

  <div class="mid">
    <div class="ttl-xl">your vagus nerve<br>isn't your<br>off-switch.</div>

    <div class="states-block">
      <!-- anxious state -->
      <div class="state-card anxious">
        <svg class="sig-icon" width="48" height="36" viewBox="0 0 48 36" fill="none">
          <polyline points="0,18 10,18 14,4 18,32 22,8 26,28 30,18 48,18"
            stroke="#C4725A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <div class="state-text">
          <div class="state-name">anxious · high arousal</div>
          <div class="state-desc">racing, tight chest</div>
          <div class="state-sub">needs a long exhale to slow the heart</div>
        </div>
      </div>

      <!-- frozen / shutdown state -->
      <div class="state-card frozen">
        <svg class="sig-icon" width="48" height="36" viewBox="0 0 48 36" fill="none">
          <polyline points="0,18 14,18 17,12 20,24 23,18 48,18"
            stroke="#6AADA0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <div class="state-text">
          <div class="state-name">frozen · shutdown</div>
          <div class="state-desc">numb, blank, stuck</div>
          <div class="state-sub">needs large-muscle movement — not more breath</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="divider"></div>
    <div class="cover-sub">two states. one nerve. very different instructions.</div>
  </div>

  <div class="wm-corner">mirrah</div>
</div>
</body>
</html>
