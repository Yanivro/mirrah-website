<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>why loneliness feels physical — mirrah cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Source+Serif+4:ital,opsz,wght@1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:900px;height:1125px;overflow:hidden;}
  body{
    background:#B0C0B2;
    font-family:Nunito,-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  :root{
    --ink:#3a3530; --ink2:#6a6560; --ink3:#9a9590;
    --coral:#C4725A; --coral-dark:#A85C46; --teal:#6AADA0;
    --grad: linear-gradient(to bottom,
      #E8AF96 0%, #D49E8A 22%, #D4A8C0 50%, #C5BCB8 75%, #B0C0B2 100%);
  }

  .slide{
    width:900px; height:1125px;
    background:var(--grad);
    display:flex; flex-direction:column; justify-content:space-between;
    padding:64px 72px 58px;
    position:relative; overflow:hidden;
  }
  .slide::before{
    content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(circle at 50% 45%, rgba(255,250,240,.55), transparent 62%);
  }
  .slide > *{position:relative; z-index:1;}

  /* TOP */
  .kick{
    font-family:Nunito; font-size:13px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:#6b4a3c;
  }

  /* MID */
  .ttl-xl{
    font-family:"Source Serif 4",serif; font-style:italic; font-weight:600;
    font-size:70px; line-height:1.04; color:#2c2722;
    letter-spacing:-.015em;
    text-shadow:0 1px 0 rgba(255,250,240,.4);
  }

  /* abstract: two signals — hunger vs loneliness side by side as meter bars */
  .signal-block{
    margin-top:44px;
    display:flex; flex-direction:column; gap:22px;
  }
  .signal-row{
    display:flex; align-items:center; gap:22px;
  }
  .signal-label{
    font-family:Nunito; font-size:11px; font-weight:800;
    letter-spacing:1.8px; text-transform:uppercase;
    color:#6a6560; width:130px; flex-shrink:0; text-align:right;
  }
  .signal-track{
    flex:1; height:20px; border-radius:10px;
    background:rgba(44,39,34,.10);
    position:relative; overflow:hidden;
  }
  .signal-fill{
    position:absolute; left:0; top:0; height:100%; border-radius:8px;
  }
  .hunger-fill{ background:linear-gradient(to right, #E8AF96, #C4725A); width:76%; }
  .lonely-fill{ background:linear-gradient(to right, #D4A8C0, #A85C46); width:90%; }
  .signal-state{
    font-family:Nunito; font-size:11px; font-weight:700;
    color:#A85C46; width:80px; flex-shrink:0;
  }

  /* science note */
  .sci-note{
    margin-top:28px;
    padding:20px 24px; border-radius:16px;
    background:rgba(255,250,240,.38);
    border:1px solid rgba(196,114,90,.18);
  }
  .sci-note-eyebrow{
    font-family:Nunito; font-size:10px; font-weight:800;
    letter-spacing:2px; text-transform:uppercase; color:#A85C46;
    margin-bottom:8px;
  }
  .sci-note-body{
    font-family:"Source Serif 4",serif; font-style:italic;
    font-size:19px; line-height:1.38; color:#2c2722;
  }

  /* BOTTOM */
  .divider{
    width:100%; height:1px;
    background:rgba(44,39,34,.14);
    margin-bottom:28px;
  }
  .cover-sub{
    font-family:"Source Serif 4",serif; font-style:italic;
    font-size:24px; line-height:1.42; color:#5a3d33;
  }

  .wm-corner{
    position:absolute; bottom:40px; right:62px;
    font-family:"Source Serif 4",serif; font-style:italic;
    font-weight:600; font-size:19px; color:#9a9590;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="kick">mirrah · the space between</div>

  <div class="mid">
    <div class="ttl-xl">your loneliness<br>behaves like<br>hunger.</div>

    <div class="signal-block">
      <div class="signal-row">
        <div class="signal-label">hunger</div>
        <div class="signal-track">
          <div class="signal-fill hunger-fill"></div>
        </div>
        <div class="signal-state">below set point</div>
      </div>
      <div class="signal-row">
        <div class="signal-label">thirst</div>
        <div class="signal-track">
          <div class="signal-fill" style="background:linear-gradient(to right,#C5BCB8,#9a9590);width:65%;"></div>
        </div>
        <div class="signal-state">below set point</div>
      </div>
      <div class="signal-row">
        <div class="signal-label">loneliness</div>
        <div class="signal-track">
          <div class="signal-fill lonely-fill"></div>
        </div>
        <div class="signal-state">below set point</div>
      </div>
    </div>

    <div class="sci-note">
      <div class="sci-note-eyebrow">Dr. Kay Tye · MIT — social homeostasis</div>
      <div class="sci-note-body">your brain has a set point for social contact — and right now, you're below it.</div>
    </div>
  </div>

  <div class="bottom">
    <div class="divider"></div>
    <div class="cover-sub">and scrolling never feeds it.</div>
  </div>

  <div class="wm-corner">mirrah</div>
</div>
</body>
</html>
